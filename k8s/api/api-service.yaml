apiVersion: v1
kind: Service
metadata:
  name: employee-api-service
  namespace: default
  labels:
    app: employee-api
    tier: backend
spec:
  type: ClusterIP  # Internal service, exposed via Ingress
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: employee-api
    tier: backend
